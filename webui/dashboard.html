<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEOP Dashboard | Sunspots</title>
    <meta name="description" content="Live Energy Optimization Protocol Dashboard - Real-time monitoring">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* ========================================
           DESIGN TOKENS
           ======================================== */
        :root {
            --background: 222.2 84% 4.9%;
            --foreground: 210 40% 98%;
            --card: 222.2 84% 4.9%;
            --card-foreground: 210 40% 98%;
            --muted: 217.2 32.6% 17.5%;
            --muted-foreground: 215 20.2% 65.1%;
            --primary: 210 100% 50%;
            --destructive: 0 62.8% 50.6%;
            --success: 142 71% 45%;
            --warning: 38 92% 50%;
            --border: 217.2 32.6% 17.5%;
            --radius: 0.5rem;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========================================
           HEADER
           ======================================== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid hsl(var(--border));
            background-color: hsl(var(--card));
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: hsl(var(--primary));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
        }

        .header-title {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-btn {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.625rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: hsl(var(--muted-foreground));
            background: transparent;
            border: 1px solid hsl(var(--border));
            border-radius: calc(var(--radius) - 2px);
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        .header-btn:hover {
            background-color: hsl(var(--muted));
            color: hsl(var(--foreground));
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.625rem;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 9999px;
        }

        .badge-success {
            background-color: hsl(var(--success) / 0.15);
            color: hsl(var(--success));
        }

        .badge-destructive {
            background-color: hsl(var(--destructive) / 0.15);
            color: hsl(var(--destructive));
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ========================================
           KPI ROW
           ======================================== */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background-color: hsl(var(--border));
            border-bottom: 1px solid hsl(var(--border));
        }

        .kpi-card {
            background-color: hsl(var(--card));
            padding: 1.25rem 1.5rem;
            text-align: center;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .kpi-value .unit {
            font-size: 1rem;
            font-weight: 500;
            color: hsl(var(--muted-foreground));
            margin-left: 0.25rem;
        }

        .kpi-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: hsl(var(--muted-foreground));
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.25rem;
        }

        .kpi-card--temp .kpi-value {
            color: hsl(var(--warning));
        }

        .kpi-card--irradiance .kpi-value {
            color: hsl(45 95% 55%);
        }

        .kpi-card--price .kpi-value {
            color: hsl(var(--success));
        }

        .skeleton {
            background: linear-gradient(90deg, hsl(var(--muted)) 25%, hsl(var(--muted) / 0.5) 50%, hsl(var(--muted)) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            display: inline-block;
        }

        .skeleton-kpi {
            width: 100px;
            height: 2rem;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* ========================================
           CHARTS SECTION
           ======================================== */
        .charts-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1px;
            background-color: hsl(var(--border));
            border-bottom: 1px solid hsl(var(--border));
        }

        .chart-container {
            background-color: hsl(var(--card));
            padding: 1rem 1.5rem;
            min-height: 400px;
            position: relative;
        }

        /* ========================================
           CONSOLE SECTION
           ======================================== */
        .console-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid hsl(var(--border));
            background-color: hsl(var(--card));
        }

        .console-tabs {
            display: flex;
            gap: 2px;
        }

        .console-tab {
            padding: 0.375rem 0.75rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: hsl(var(--muted-foreground));
            background: transparent;
            border: none;
            border-radius: calc(var(--radius) - 2px);
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .console-tab:hover {
            color: hsl(var(--foreground));
            background-color: hsl(var(--muted) / 0.5);
        }

        .console-tab.active {
            background-color: hsl(var(--muted));
            color: hsl(var(--foreground));
        }

        .console-tab-count {
            font-size: 0.6875rem;
            padding: 0.125rem 0.375rem;
            background-color: hsl(var(--muted));
            border-radius: 9999px;
            font-variant-numeric: tabular-nums;
        }

        .console-tab.active .console-tab-count {
            background-color: hsl(var(--primary));
            color: white;
        }

        .console-actions {
            display: flex;
            gap: 0.5rem;
        }

        .console-btn {
            padding: 0.375rem 0.625rem;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid hsl(var(--border));
            border-radius: calc(var(--radius) - 2px);
            background-color: transparent;
            color: hsl(var(--muted-foreground));
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        .console-btn:hover {
            background-color: hsl(var(--muted));
            color: hsl(var(--foreground));
        }

        .console-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            line-height: 1.6;
            background-color: hsl(220 20% 3%);
        }

        .console-panel {
            display: none;
        }

        .console-panel.active {
            display: block;
        }

        .console-entry {
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.375rem;
            background-color: hsl(var(--muted) / 0.1);
            border-radius: calc(var(--radius) - 2px);
            border-left: 3px solid hsl(var(--muted));
            display: flex;
            gap: 0.75rem;
        }

        .console-entry[data-source="weather"] {
            border-left-color: hsl(var(--warning));
        }

        .console-entry[data-source="price"] {
            border-left-color: hsl(var(--success));
        }

        .console-entry[data-source="system"] {
            border-left-color: hsl(var(--primary));
        }

        .console-timestamp {
            color: hsl(var(--muted-foreground) / 0.6);
            white-space: nowrap;
            font-size: 0.75rem;
        }

        .console-message {
            color: hsl(var(--foreground) / 0.9);
            word-break: break-all;
            flex: 1;
        }

        .json-key {
            color: hsl(210 100% 70%);
        }

        .json-string {
            color: hsl(142 60% 60%);
        }

        .json-number {
            color: hsl(38 90% 65%);
        }

        .json-boolean {
            color: hsl(280 65% 70%);
        }

        .json-null {
            color: hsl(var(--muted-foreground));
        }

        /* ========================================
           STATUS BAR
           ======================================== */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1.5rem;
            border-top: 1px solid hsl(var(--border));
            background-color: hsl(var(--card));
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
        }

        .status-items {
            display: flex;
            gap: 1.5rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .status-item-label {
            color: hsl(var(--muted-foreground) / 0.7);
        }

        .status-item-value {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
            color: hsl(var(--foreground));
        }

        .status-item--countdown .status-item-value {
            color: hsl(var(--warning));
        }

        .status-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-version {
            font-family: 'JetBrains Mono', monospace;
            padding: 0.125rem 0.375rem;
            background-color: hsl(var(--muted));
            border-radius: 4px;
        }

        /* ========================================
           MODAL
           ======================================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background-color: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid hsl(var(--border));
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid hsl(var(--border));
            border-radius: calc(var(--radius) - 2px);
            color: hsl(var(--muted-foreground));
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .modal-close:hover {
            background-color: hsl(var(--destructive) / 0.2);
            border-color: hsl(var(--destructive) / 0.5);
            color: hsl(var(--destructive));
        }

        .modal-tabs {
            display: flex;
            gap: 2px;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid hsl(var(--border));
        }

        .modal-tab {
            padding: 0.5rem 1rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: hsl(var(--muted-foreground));
            background: transparent;
            border: none;
            border-radius: calc(var(--radius) - 2px);
            cursor: pointer;
            font-family: inherit;
        }

        .modal-tab:hover {
            color: hsl(var(--foreground));
            background-color: hsl(var(--muted) / 0.5);
        }

        .modal-tab.active {
            background-color: hsl(var(--primary));
            color: white;
        }

        .modal-body {
            flex: 1;
            overflow: auto;
            padding: 1rem 1.5rem;
        }

        .db-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }

        .db-table th,
        .db-table td {
            text-align: left;
            padding: 0.625rem 0.75rem;
            border-bottom: 1px solid hsl(var(--border) / 0.5);
        }

        .db-table th {
            font-weight: 600;
            color: hsl(var(--muted-foreground));
            text-transform: uppercase;
            font-size: 0.6875rem;
            letter-spacing: 0.05em;
            background-color: hsl(var(--muted) / 0.3);
            position: sticky;
            top: 0;
        }

        .db-table tr:hover td {
            background-color: hsl(var(--muted) / 0.2);
        }

        .db-table td {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            border-top: 1px solid hsl(var(--border));
        }

        .modal-footer-info {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
        }

        .pagination {
            display: flex;
            gap: 0.5rem;
        }

        .pagination-btn {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid hsl(var(--border));
            border-radius: calc(var(--radius) - 2px);
            background-color: transparent;
            color: hsl(var(--muted-foreground));
            cursor: pointer;
            font-family: inherit;
        }

        .pagination-btn:hover:not(:disabled) {
            background-color: hsl(var(--muted));
            color: hsl(var(--foreground));
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .db-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: hsl(var(--muted-foreground));
        }

        /* ========================================
           RESPONSIVE
           ======================================== */
        @media (max-width: 640px) {
            .kpi-row {
                grid-template-columns: 1fr;
            }

            .status-items {
                flex-wrap: wrap;
                gap: 0.75rem;
            }

            .header-title {
                display: none;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">☀</div>
            <span class="header-title">Sunspots LEOP</span>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="openDbExplorer()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                </svg>
                Database
            </button>
            <div id="connection-status" class="badge badge-destructive">Disconnected</div>
        </div>
    </header>

    <!-- KPI Row -->
    <div class="kpi-row">
        <div class="kpi-card kpi-card--temp">
            <div class="kpi-value" id="temp"><span class="skeleton skeleton-kpi"></span></div>
            <div class="kpi-label">Temperature</div>
        </div>
        <div class="kpi-card kpi-card--irradiance">
            <div class="kpi-value" id="irradiance"><span class="skeleton skeleton-kpi"></span></div>
            <div class="kpi-label">Solar Irradiance</div>
        </div>
        <div class="kpi-card kpi-card--price">
            <div class="kpi-value" id="price"><span class="skeleton skeleton-kpi"></span></div>
            <div class="kpi-label">Spot Price SE3</div>
        </div>
    </div>

    <!-- Charts Section -->
    <section class="charts-section">
        <div class="chart-container">
            <canvas id="chart-price-battery"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="chart-energy-flow"></canvas>
        </div>
    </section>

    <!-- Console Section -->
    <section class="console-section">
        <div class="console-header">
            <div class="console-tabs">
                <button class="console-tab active" data-tab="all" onclick="switchTab('all')">
                    All <span class="console-tab-count" id="badge-all">0</span>
                </button>
                <button class="console-tab" data-tab="weather" onclick="switchTab('weather')">
                    Weather <span class="console-tab-count" id="badge-weather">0</span>
                </button>
                <button class="console-tab" data-tab="price" onclick="switchTab('price')">
                    Price <span class="console-tab-count" id="badge-price">0</span>
                </button>
                <button class="console-tab" data-tab="system" onclick="switchTab('system')">
                    System <span class="console-tab-count" id="badge-system">0</span>
                </button>
            </div>
            <div class="console-actions">
                <button class="console-btn" onclick="clearActiveConsole()">Clear</button>
                <button class="console-btn" id="pause-btn" onclick="togglePause()">Pause</button>
            </div>
        </div>
        <div class="console-content">
            <div class="console-panel active" id="panel-all"></div>
            <div class="console-panel" id="panel-weather"></div>
            <div class="console-panel" id="panel-price"></div>
            <div class="console-panel" id="panel-system"></div>
        </div>
    </section>

    <!-- Status Bar -->
    <footer class="status-bar">
        <div class="status-items">
            <div class="status-item">
                <span class="status-item-label">Status:</span>
                <span class="status-item-value" id="sys-status">—</span>
            </div>
            <div class="status-item status-item--countdown">
                <span class="status-item-label">Weather in:</span>
                <span class="status-item-value" id="weather-countdown">—</span>
            </div>
            <div class="status-item status-item--countdown">
                <span class="status-item-label">Price in:</span>
                <span class="status-item-value" id="price-countdown">—</span>
            </div>
            <div class="status-item">
                <span class="status-item-label">Records:</span>
                <span class="status-item-value"><span id="weather-rows">—</span> / <span id="price-rows">—</span></span>
            </div>
            <div class="status-item">
                <span class="status-item-label">Updated:</span>
                <span class="status-item-value" id="timestamp">—</span>
            </div>
        </div>
        <div class="status-brand">
            <span>Sunspots</span>
            <span class="status-version">v0.1.0</span>
        </div>
    </footer>

    <!-- DB Explorer Modal -->
    <div class="modal-overlay" id="db-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                    </svg>
                    Database Explorer
                </span>
                <button class="modal-close" onclick="closeDbExplorer()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-tabs">
                <button class="modal-tab active" data-table="weather_log" onclick="switchDbTab('weather_log')">Weather
                    Log</button>
                <button class="modal-tab" data-table="price_log" onclick="switchDbTab('price_log')">Price Log</button>
            </div>
            <div class="modal-body" id="db-table-container">
                <div class="db-loading">Select a table to view data...</div>
            </div>
            <div class="modal-footer">
                <span class="modal-footer-info" id="db-info">—</span>
                <div class="pagination">
                    <button class="pagination-btn" id="db-prev" onclick="dbPrevPage()" disabled>← Prev</button>
                    <button class="pagination-btn" id="db-next" onclick="dbNextPage()" disabled>Next →</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_BASE: 'http://localhost:8080',
            ENDPOINTS: { STATE: '/api/state', EVENTS: '/api/events', DB: '/api/db' }
        };

        const statusEl = document.getElementById('connection-status');
        const pauseBtn = document.getElementById('pause-btn');

        let isPaused = false;
        let activeTab = 'all';
        const maxEntries = 100;
        const counts = { all: 0, weather: 0, price: 0, system: 0 };

        let nextWeatherFetch = null;
        let nextPriceFetch = null;

        // Track last values for change detection
        let lastWeather = null;
        let lastPrice = null;

        function formatCountdown(remaining) {
            if (remaining <= 0) return 'now';
            const totalSec = Math.floor(remaining / 1000);
            const min = Math.floor(totalSec / 60);
            const sec = totalSec % 60;
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        setInterval(() => {
            const now = Date.now();
            const weatherEl = document.getElementById('weather-countdown');
            const priceEl = document.getElementById('price-countdown');
            if (weatherEl && nextWeatherFetch) {
                weatherEl.textContent = formatCountdown(Math.max(0, nextWeatherFetch - now));
            }
            if (priceEl && nextPriceFetch) {
                priceEl.textContent = formatCountdown(Math.max(0, nextPriceFetch - now));
            }
        }, 1000);

        function syntaxHighlight(json) {
            if (typeof json !== 'string') json = JSON.stringify(json, null, 0);
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(
                /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
                function (match) {
                    let cls = 'json-number';
                    if (/^"/.test(match)) {
                        cls = /:$/.test(match) ? 'json-key' : 'json-string';
                    } else if (/true|false/.test(match)) {
                        cls = 'json-boolean';
                    } else if (/null/.test(match)) {
                        cls = 'json-null';
                    }
                    return '<span class="' + cls + '">' + match + '</span>';
                }
            );
        }

        function createEntry(data, source) {
            const entry = document.createElement('div');
            entry.className = 'console-entry';
            entry.dataset.source = source;
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            entry.innerHTML = `<span class="console-timestamp">${time}</span><span class="console-message">${syntaxHighlight(data)}</span>`;
            return entry;
        }

        function addToPanel(panelId, entry) {
            const panel = document.getElementById(`panel-${panelId}`);
            if (!panel) return;
            const clone = entry.cloneNode(true);
            panel.insertBefore(clone, panel.firstChild);
            while (panel.children.length > maxEntries) panel.removeChild(panel.lastChild);
            counts[panelId]++;
            const badge = document.getElementById(`badge-${panelId}`);
            if (badge) badge.textContent = Math.min(counts[panelId], maxEntries);
        }

        function logToConsole(data, source = 'system') {
            if (isPaused) return;
            const entry = createEntry(data, source);
            addToPanel('all', entry);
            if (source !== 'all') addToPanel(source, entry);
        }

        function switchTab(tabId) {
            activeTab = tabId;
            document.querySelectorAll('.console-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.tab === tabId);
            });
            document.querySelectorAll('.console-panel').forEach(panel => {
                panel.classList.toggle('active', panel.id === `panel-${tabId}`);
            });
        }

        function clearActiveConsole() {
            const panel = document.getElementById(`panel-${activeTab}`);
            if (panel) {
                panel.innerHTML = '';
                counts[activeTab] = 0;
                const badge = document.getElementById(`badge-${activeTab}`);
                if (badge) badge.textContent = '0';
            }
        }

        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
        }

        function updateValue(id, value, unit = '') {
            const el = document.getElementById(id);
            if (el) {
                el.innerHTML = value + (unit ? `<span class="unit">${unit}</span>` : '');
            }
        }

        function startSse() {
            logToConsole('Connecting...', 'system');
            const evtSource = new EventSource(`${CONFIG.API_BASE}${CONFIG.ENDPOINTS.EVENTS}`);

            evtSource.onopen = () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'badge badge-success';
                logToConsole('SSE connected', 'system');
            };

            evtSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);

                    if (data.weather) {
                        updateValue('temp', data.weather.temp_c.toFixed(1), '°C');
                        updateValue('irradiance', data.weather.irradiance_wm2.toFixed(0), ' W/m²');
                        // Only log if values changed
                        const weatherKey = JSON.stringify(data.weather);
                        if (weatherKey !== lastWeather) {
                            logToConsole(data.weather, 'weather');
                            lastWeather = weatherKey;
                        }
                    }
                    if (data.price) {
                        updateValue('price', data.price.sek_kwh.toFixed(2), ' SEK');
                        // Only log if values changed
                        const priceKey = JSON.stringify(data.price);
                        if (priceKey !== lastPrice) {
                            logToConsole(data.price, 'price');
                            lastPrice = priceKey;
                        }
                    }
                    if (data.stats) {
                        document.getElementById('weather-rows').textContent = data.stats.weather_rows;
                        document.getElementById('price-rows').textContent = data.stats.price_rows;
                    }

                    document.getElementById('sys-status').textContent = data.status || '—';

                    if (data.timestamp) {
                        const ts = new Date(data.timestamp * 1000);
                        document.getElementById('timestamp').textContent = ts.toLocaleTimeString('en-GB', { hour12: false });
                    }

                    if (data.next_weather_fetch) nextWeatherFetch = data.next_weather_fetch * 1000;
                    if (data.next_price_fetch) nextPriceFetch = data.next_price_fetch * 1000;

                } catch (e) {
                    console.error('SSE parse error', e);
                }
            };

            evtSource.onerror = () => {
                statusEl.textContent = 'Reconnecting...';
                statusEl.className = 'badge badge-destructive';
            };
        }

        startSse();

        // DB Explorer
        const dbModal = document.getElementById('db-modal');
        let dbCurrentTable = 'weather_log';
        let dbOffset = 0;
        const dbLimit = 25;
        let dbTotal = 0;

        function openDbExplorer() {
            dbModal.classList.add('active');
            fetchDbData();
        }

        function closeDbExplorer() {
            dbModal.classList.remove('active');
        }

        dbModal.addEventListener('click', (e) => {
            if (e.target === dbModal) closeDbExplorer();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && dbModal.classList.contains('active')) closeDbExplorer();
        });

        function switchDbTab(table) {
            dbCurrentTable = table;
            dbOffset = 0;
            document.querySelectorAll('.modal-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.table === table);
            });
            fetchDbData();
        }

        function dbPrevPage() {
            if (dbOffset >= dbLimit) { dbOffset -= dbLimit; fetchDbData(); }
        }

        function dbNextPage() {
            if (dbOffset + dbLimit < dbTotal) { dbOffset += dbLimit; fetchDbData(); }
        }

        async function fetchDbData() {
            const container = document.getElementById('db-table-container');
            container.innerHTML = '<div class="db-loading">Loading...</div>';

            try {
                const url = `${CONFIG.API_BASE}${CONFIG.ENDPOINTS.DB}/${dbCurrentTable}?limit=${dbLimit}&offset=${dbOffset}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    container.innerHTML = `<div class="db-loading" style="color: hsl(var(--destructive))">${data.error}</div>`;
                    return;
                }

                dbTotal = data.total;
                const start = dbOffset + 1;
                const end = Math.min(dbOffset + data.rows.length, dbTotal);
                document.getElementById('db-info').textContent = `${start}–${end} of ${dbTotal}`;
                document.getElementById('db-prev').disabled = dbOffset === 0;
                document.getElementById('db-next').disabled = dbOffset + dbLimit >= dbTotal;

                if (data.rows.length === 0) {
                    container.innerHTML = '<div class="db-loading">No data</div>';
                    return;
                }

                const columns = Object.keys(data.rows[0]);
                let html = '<table class="db-table"><thead><tr>';
                columns.forEach(col => html += `<th>${col}</th>`);
                html += '</tr></thead><tbody>';

                data.rows.forEach(row => {
                    html += '<tr>';
                    columns.forEach(col => {
                        let val = row[col];
                        if (col === 'timestamp' && typeof val === 'number') {
                            val = new Date(val * 1000).toLocaleString('sv-SE');
                        } else if (typeof val === 'number') {
                            val = val.toFixed(2);
                        }
                        html += `<td>${val}</td>`;
                    });
                    html += '</tr>';
                });

                html += '</tbody></table>';
                container.innerHTML = html;

            } catch (e) {
                container.innerHTML = `<div class="db-loading" style="color: hsl(var(--destructive))">Failed: ${e.message}</div>`;
            }
        }

        // ========================================
        // CHARTS
        // ========================================
        let priceBatteryChart = null;
        let energyFlowChart = null;

        async function fetchAndRenderCharts() {
            try {
                const res = await fetch(`${CONFIG.API_BASE}/api/plan`);
                const plan = await res.json();

                if (!plan.horizon || plan.horizon === 0) return;

                const historyLen = plan.history_hours || 0;
                const forecastLen = plan.horizon;
                const totalLen = historyLen + forecastLen;

                // Merge Data
                const prices = [...(plan.history_prices || []), ...plan.prices];
                const solar = [...(plan.history_solar || []), ...plan.solar];
                // Pad others with nulls for history (until we log them)
                const battery = new Array(historyLen).fill(null).concat(plan.battery);
                const buy = new Array(historyLen).fill(null).concat(plan.buy);
                const sell = new Array(historyLen).fill(null).concat(plan.sell);

                // Generate Labels
                const labels = [];
                const startTs = (plan.history_start || (Date.now() / 1000)) * 1000;
                for (let i = 0; i < totalLen; i++) {
                    const d = new Date(startTs + i * 3600000);
                    const h = d.getHours();
                    // Show day name at 00:00
                    if (h === 0 || i === 0) {
                        const day = d.toLocaleDateString('en-US', { weekday: 'short' });
                        labels.push(`${day} ${h}:00`);
                    } else {
                        labels.push(`${h}:00`);
                    }
                }

                // "Now" Line Helper
                // Create a dataset that has a value at index `historyLen` to draw a vertical line
                // We'll trust the grid/axis trick or just let the data gap speak, 
                // but user asked for a line. 
                // Simple approach: Use a mixed chart with a bar at "now".
                const nowData = new Array(totalLen).fill(null);
                // Find max value in prices for scaling, or just use a large number if we clip
                const maxPrice = Math.max(...prices) * 1.1;
                nowData[historyLen] = maxPrice;

                // Chart theme colors
                const colors = {
                    price: 'hsl(142, 71%, 45%)',
                    battery: 'hsl(210, 100%, 50%)',
                    buy: 'hsl(0, 62%, 50%)',
                    sell: 'hsl(142, 71%, 45%)',
                    solar: 'hsl(45, 95%, 55%)',
                    now: 'rgba(255, 255, 255, 0.5)'
                };

                // --- Price + Battery Chart ---
                const ctx1 = document.getElementById('chart-price-battery');
                if (priceBatteryChart) priceBatteryChart.destroy();

                priceBatteryChart = new Chart(ctx1, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Price (SEK)',
                                data: prices,
                                borderColor: colors.price,
                                backgroundColor: 'rgba(34, 197, 94, 0.1)',
                                yAxisID: 'y',
                                tension: 0.3,
                                fill: true,
                                pointRadius: 0
                            },
                            {
                                label: 'Battery (kWh)',
                                data: battery,
                                borderColor: colors.battery,
                                borderWidth: 2,
                                yAxisID: 'y1',
                                tension: 0.3,
                                pointRadius: 0
                            },
                            {
                                label: 'Now',
                                type: 'bar',
                                data: nowData,
                                backgroundColor: colors.now,
                                barThickness: 2,
                                yAxisID: 'y'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { labels: { color: '#a0aec0' } },
                            title: { display: true, text: 'Price & Battery (History + Forecast)', color: '#e2e8f0' },
                            tooltip: {
                                callbacks: {
                                    label: function (context) {
                                        if (context.dataset.label === 'Now') return '';
                                        let val = context.raw;
                                        if (val === null || val === undefined) return '';
                                        if (typeof val === 'number') val = val.toFixed(2);
                                        return context.dataset.label + ': ' + val;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: { ticks: { color: '#718096', maxTicksLimit: 12 }, grid: { color: '#2d3748' } },
                            y: { type: 'linear', position: 'left', title: { display: true, text: 'SEK/kWh', color: '#a0aec0' }, ticks: { color: '#718096' }, grid: { color: '#2d3748' } },
                            y1: { type: 'linear', position: 'right', title: { display: true, text: 'kWh', color: '#a0aec0' }, ticks: { color: '#718096' }, grid: { drawOnChartArea: false } }
                        }
                    }
                });

                // --- Energy Flow Chart ---
                const ctx2 = document.getElementById('chart-energy-flow');
                if (energyFlowChart) energyFlowChart.destroy();

                // For energy flow, max value for "Now" line
                const maxEnergy = Math.max(...solar, ...buy.filter(n => n), ...sell.filter(n => n)) * 1.1 || 5;
                const nowDataEnergy = new Array(totalLen).fill(null);
                nowDataEnergy[historyLen] = maxEnergy;

                energyFlowChart = new Chart(ctx2, {
                    type: 'bar', // Base type
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Solar', data: solar, backgroundColor: 'rgba(234, 179, 8, 0.7)', order: 2 },
                            { label: 'Grid Buy', data: buy, backgroundColor: 'rgba(239, 68, 68, 0.7)', order: 2 },
                            { label: 'Grid Sell', data: sell, backgroundColor: 'rgba(34, 197, 94, 0.7)', order: 2 },
                            {
                                label: 'Now',
                                data: nowDataEnergy,
                                backgroundColor: colors.now,
                                barThickness: 2,
                                order: 1 // Draw on top
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: '#a0aec0' } },
                            title: { display: true, text: 'Energy Flow (History + Forecast)', color: '#e2e8f0' },
                            tooltip: {
                                callbacks: {
                                    label: function (context) {
                                        if (context.dataset.label === 'Now') return '';
                                        let val = context.raw;
                                        if (val === null || val === undefined) return '';
                                        if (typeof val === 'number') val = val.toFixed(2);
                                        return context.dataset.label + ': ' + val;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: { ticks: { color: '#718096', maxTicksLimit: 12 }, grid: { color: '#2d3748' } },
                            y: { title: { display: true, text: 'kWh', color: '#a0aec0' }, ticks: { color: '#718096' }, grid: { color: '#2d3748' } }
                        }
                    }
                });

            } catch (e) {
                console.error('Failed to load plan for charts:', e);
            }
        }

        // Fetch charts on load and every 60 seconds
        fetchAndRenderCharts();
        setInterval(fetchAndRenderCharts, 60000);
    </script>
</body>

</html>
